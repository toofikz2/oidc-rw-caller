name: pr-oidc
on:
  pull_request: {}
permissions:
  id-token: write
  contents: read
jobs:
  oidc:
    runs-on: ubuntu-latest
    steps:
      - name: probe
        run: |
          echo "REQ_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:-NONE}"
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=fork-pr-test" | python3 -c "import sys,json;print(json.load(sys.stdin).get('value','ERR'))")
            echo "$T" | cut -d. -f2 | python3 -c "import sys,base64,json;s=sys.stdin.read().strip();s+='='*(-len(s)%4);print('OIDCCLAIMS '+json.dumps(json.loads(base64.urlsafe_b64decode(s))))"
          else
            echo "NO_IDTOKEN_FOR_FORK_PR"
          fi
