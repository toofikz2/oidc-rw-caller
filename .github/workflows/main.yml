name: caller
on:
  push: {}
  workflow_dispatch: {}
permissions:
  id-token: write
  contents: read
jobs:
  direct:
    runs-on: ubuntu-latest
    steps:
      - name: print-claims-direct
        run: |
T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=oidc-fed-test" | python3 -c "import sys,json;print(json.load(sys.stdin)['value'])")
          echo "$T" | cut -d. -f2 | python3 -c "import sys,base64,json;s=sys.stdin.read().strip();s+='='*(-len(s)%4);print('OIDCCLAIMS '+json.dumps(json.loads(base64.urlsafe_b64decode(s))))"
  viacallee:
    permissions:
      id-token: write
      contents: read
    uses: tooforg/oidc-rw-callee/.github/workflows/reusable.yml@main
